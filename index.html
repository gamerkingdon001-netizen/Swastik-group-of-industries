<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swastik Group GOD LEVEL</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#e8fdf5,#ffffff)}
nav{background:#27ae60;color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000}
.logo{font-size:24px;font-weight:700}
.search{padding:10px;border-radius:25px;border:none;width:220px}
.cart{background:#e74c3c;padding:8px 15px;border-radius:20px;cursor:pointer}
.hero{padding:60px;text-align:center;color:#fff;background:linear-gradient(135deg,#27ae60,#2ecc71)}
.hero h1{font-size:40px}
.container{padding:20px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;justify-content:center}
.filters button{padding:8px 18px;border-radius:25px;border:2px solid #27ae60;background:#fff;color:#27ae60;cursor:pointer}
.filters .active{background:#27ae60;color:#fff}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.card{background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.1);transition:.3s}
.card:hover{transform:translateY(-8px) scale(1.02)}
.card img{width:100%;height:170px;object-fit:cover}
.card-body{padding:15px}
.price{color:#27ae60;font-weight:700;margin:10px 0}
button{background:#27ae60;color:#fff;border:none;padding:10px;border-radius:6px;width:100%;cursor:pointer}
.cart-box{position:fixed;right:-350px;top:0;width:320px;height:100%;background:#fff;box-shadow:-5px 0 25px rgba(0,0,0,.2);padding:20px;transition:.4s;overflow:auto}
.cart-box.open{right:0}
.cart-item{margin-bottom:15px;border-bottom:1px solid #ddd;padding-bottom:10px}
.checkout{background:#25D366;margin-top:10px}
.upi{background:#6c5ce7;margin-top:10px}
.footer{text-align:center;padding:20px;background:#2c3e50;color:#fff;margin-top:30px}
</style>
</head>

<body>

<nav>
<div class="logo">🌾 Swastik Group</div>
<input class="search" placeholder="Search..." id="search" oninput="updateView()">
<div class="cart" onclick="toggleCart()" id="cartCount">Cart: 0</div>
</nav>

<div class="hero">
<h1>Premium Grocery Experience</h1>
<p>Direct from farmers • Fast delivery • Best quality</p>
</div>

<div class="container">
<div class="filters">
<button onclick="setFilter('all',this)" class="active">All</button>
<button onclick="setFilter('fresh',this)">Fresh</button>
<button onclick="setFilter('dairy',this)">Dairy</button>
<button onclick="setFilter('pantry',this)">Pantry</button>
</div>

<div class="products" id="products"></div>
</div>

<div class="cart-box" id="cartBox">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<button class="checkout" onclick="checkout()">WhatsApp Order</button>
<button class="upi" onclick="payUPI()">UPI Pay</button>
</div>

<div class="footer">© 2026 Swastik Group | Built for Business 🚀</div>

<script>
const phone="919475362410";
const upi="swastiklal@fam";

const products=[
{id:1,name:"Tomato",price:50,cat:"fresh",img:"https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400"},
{id:2,name:"Milk",price:60,cat:"dairy",img:"https://images.unsplash.com/photo-1550583724-b2692b85b150?w=400"},
{id:3,name:"Rice",price:120,cat:"pantry",img:"https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400"},
{id:4,name:"Eggs",price:200,cat:"dairy",img:"https://images.unsplash.com/photo-1587486913049-53fc88980cfc?w=400"}
];

let cart=JSON.parse(localStorage.getItem('cart'))||[];
let filter='all';

function render(list){
const box=document.getElementById('products');
box.innerHTML='';
list.forEach(p=>{
box.innerHTML+=`<div class='card'>
<img src='${p.img}'>
<div class='card-body'>
<h4>${p.name}</h4>
<div class='price'>₹${p.price}</div>
<button onclick='add(${p.id})'>Add to Cart</button>
</div></div>`;
});
}

function updateView(){
const q=document.getElementById('search').value.toLowerCase();
let list=products.filter(p=>(filter==='all'||p.cat===filter)&&p.name.toLowerCase().includes(q));
render(list);
}

function setFilter(f,el){
filter=f;
document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
updateView();
}

function add(id){
let item=cart.find(i=>i.id===id);
if(item){item.qty++}else{let p=products.find(x=>x.id===id);cart.push({...p,qty:1})}
save();
}

function remove(id){
cart=cart.filter(i=>i.id!==id);
save();
}

function save(){
localStorage.setItem('cart',JSON.stringify(cart));
updateCart();
}

function updateCart(){
let count=cart.reduce((a,b)=>a+b.qty,0);
document.getElementById('cartCount').innerText='Cart: '+count;
renderCart();
}

function renderCart(){
const box=document.getElementById('cartItems');
box.innerHTML='';
cart.forEach(i=>{
box.innerHTML+=`<div class='cart-item'>${i.name} x${i.qty}<br>₹${i.price*i.qty}
<button onclick='remove(${i.id})'>Remove</button></div>`;
});
}

function toggleCart(){
document.getElementById('cartBox').classList.toggle('open');
}

function checkout(){
if(cart.length===0)return alert('Cart empty');
let msg='Order:%0A';
let total=0;
cart.forEach(i=>{total+=i.price*i.qty;msg+=`${i.name} x${i.qty} = ₹${i.price*i.qty}%0A`;});
msg+=`Total ₹${total}`;
window.open(`https://wa.me/${phone}?text=${msg}`);
cart=[];save();
}

function payUPI(){
if(cart.length===0)return alert('Cart empty');
let total=cart.reduce((a,b)=>a+(b.price*b.qty),0);
window.location.href=`upi://pay?pa=${upi}&pn=Swastik%20Group&am=${total}&cu=INR`;
}

updateCart();
updateView();
</script>

</body>
</html>
